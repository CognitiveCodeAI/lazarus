<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" role="img" aria-label="Before and after GitAlive: the same repo page, first as a stranger sees it with missing title, missing CI badge and stale docs, then fixed — real H1, live CI badge, table of contents, current docs, scorecard clean.">
  <rect width="960" height="500" fill="#0d1117"/>

  <!-- titles -->
  <text x="240" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f85149">BEFORE</text>
  <text x="720" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#3fb950">AFTER</text>

  <!-- center arrow -->
  <g>
    <rect x="425" y="225" width="110" height="50" rx="25" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="480" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#58a6ff">⚡ gitalive</text>
    <text x="480" y="263" text-anchor="middle" font-size="11" fill="#8b949e">+ repair</text>
  </g>

  <!-- BEFORE panel -->
  <g>
    <rect x="40" y="60" width="400" height="400" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <!-- banner with name trapped inside image -->
    <rect x="64" y="84" width="352" height="64" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="240" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#6e7681" font-style="italic">LAZARUS  (text inside a PNG)</text>
    <text x="240" y="134" text-anchor="middle" font-size="11" fill="#6e7681">screen readers &amp; search see: nothing</text>
    <text x="64" y="172" font-size="13" fill="#f85149">✗ no H1 — the project's name exists only in an image</text>
    <!-- badges -->
    <g>
      <rect x="64" y="188" width="74" height="20" rx="4" fill="#21262d" stroke="#30363d"/>
      <text x="101" y="202" text-anchor="middle" font-size="10" fill="#8b949e">license MIT</text>
      <rect x="146" y="188" width="64" height="20" rx="4" fill="#21262d" stroke="#30363d"/>
      <text x="178" y="202" text-anchor="middle" font-size="10" fill="#8b949e">plugin</text>
      <rect x="218" y="188" width="92" height="20" rx="4" fill="#21262d" stroke="#f85149" stroke-dasharray="4 3"/>
      <text x="264" y="202" text-anchor="middle" font-size="10" fill="#f85149">CI badge?</text>
    </g>
    <text x="64" y="234" font-size="13" fill="#f85149">✗ CI pipeline exists — no badge wears it</text>
    <!-- toc -->
    <rect x="64" y="252" width="352" height="34" rx="6" fill="#21262d" stroke="#f85149" stroke-dasharray="4 3"/>
    <text x="240" y="273" text-anchor="middle" font-size="12" fill="#f85149">✗ ~300-line README, no table of contents</text>
    <!-- stale docs -->
    <rect x="64" y="300" width="352" height="50" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="76" y="320" font-size="12" fill="#c9d1d9">CONTRIBUTING.md: “It ships two plugins…”</text>
    <text x="76" y="338" font-size="12" fill="#f85149">✗ the marketplace ships three</text>
    <!-- scorecard -->
    <rect x="64" y="370" width="352" height="66" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="76" y="392" font-size="12" font-weight="700" fill="#c9d1d9">GITALIVE_AUDIT.md scorecard</text>
    <text x="76" y="414" font-size="13" fill="#f85149">0 Critical · 2 High · 2 Medium · 4 Low</text>
    <text x="76" y="430" font-size="11" fill="#8b949e">README C · Community B · Accessibility B</text>
  </g>

  <!-- AFTER panel -->
  <g>
    <rect x="520" y="60" width="400" height="400" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <!-- real H1 + banner -->
    <text x="720" y="106" text-anchor="middle" font-size="24" font-weight="800" fill="#e6edf3">Lazarus</text>
    <rect x="544" y="118" width="352" height="30" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="720" y="138" text-anchor="middle" font-size="11" fill="#8b949e">banner art (decorative — name now in real text)</text>
    <text x="544" y="172" font-size="13" fill="#3fb950">✓ real &lt;h1&gt; — readable by humans, readers, search</text>
    <!-- badges -->
    <g>
      <rect x="544" y="188" width="86" height="20" rx="4" fill="#21262d" stroke="#3fb950"/>
      <text x="587" y="202" text-anchor="middle" font-size="10" fill="#3fb950">CI ✓ passing</text>
      <rect x="638" y="188" width="74" height="20" rx="4" fill="#21262d" stroke="#30363d"/>
      <text x="675" y="202" text-anchor="middle" font-size="10" fill="#8b949e">license MIT</text>
      <rect x="720" y="188" width="64" height="20" rx="4" fill="#21262d" stroke="#30363d"/>
      <text x="752" y="202" text-anchor="middle" font-size="10" fill="#8b949e">plugin</text>
    </g>
    <text x="544" y="234" font-size="13" fill="#3fb950">✓ live CI badge, linked to the runs page</text>
    <!-- toc -->
    <rect x="544" y="252" width="352" height="34" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="556" y="273" font-size="11" fill="#58a6ff">Contents: goals · install · watch it work · journeys · FAQ</text>
    <!-- current docs -->
    <rect x="544" y="300" width="352" height="50" rx="6" fill="#21262d" stroke="#30363d"/>
    <text x="556" y="320" font-size="12" fill="#c9d1d9">CONTRIBUTING.md: “It ships three plugins…”</text>
    <text x="556" y="338" font-size="12" fill="#3fb950">✓ contributor docs match reality</text>
    <!-- scorecard -->
    <rect x="544" y="370" width="352" height="66" rx="6" fill="#21262d" stroke="#3fb950"/>
    <text x="556" y="392" font-size="12" font-weight="700" fill="#c9d1d9">Re-audit scorecard (the receipt)</text>
    <text x="556" y="414" font-size="13" fill="#3fb950">0 Critical · 0 High · 0 Medium — every fix verified</text>
    <text x="556" y="430" font-size="11" fill="#8b949e">7/7 community profile ✓ · zero shell commands run</text>
  </g>

  <text x="480" y="486" text-anchor="middle" font-size="12" fill="#8b949e">The same repo, as a stranger sees it — every finding cited to a real standard, fixed behind your approval. Receipts: the v0.6.0–v0.8.0 release notes.</text>
</svg>
