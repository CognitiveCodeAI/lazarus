<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'DejaVu Sans Mono', monospace">
  <defs>
    <clipPath id="screen"><rect x="10" y="10" width="800" height="500" rx="12"/></clipPath>
  </defs>

  <!-- window -->
  <rect x="10" y="10" width="800" height="500" rx="12" fill="#0b0f17" stroke="#1f2733" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="10" y="10" width="800" height="38" rx="12" fill="#11161f"/>
  <rect x="10" y="34" width="800" height="14" fill="#11161f"/>
  <circle cx="32" cy="29" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="29" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="29" r="6" fill="#27c93f"/>
  <text x="410" y="33" text-anchor="middle" font-size="13" fill="#5b6675">legacy-toolkit — live</text>

  <g clip-path="url(#screen)" font-size="15">
    <!-- L1 prompt -->
    <text x="30" y="82" fill="#768390">you@laptop <tspan fill="#57ab5a">~/scary-legacy-app</tspan> $ <tspan fill="#adbac7">claude</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.027;0.049;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <!-- L2 user -->
    <text x="30" y="108" fill="#6cb6ff">❯ make this legacy repo run locally
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.073;0.095;1" dur="15s" repeatCount="indefinite"/>
    </text>

    <!-- L3 discover -->
    <text x="30" y="142" fill="#dcbdfb">🔍 legacy-discover <tspan fill="#5b6675">· read-only · Plan Mode</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.133;0.155;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="48" y="167" fill="#768390">• needs Node 18 · lockfile is npm-shrinkwrap
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.173;0.195;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="48" y="192" fill="#768390">• missing .env: <tspan fill="#e3b341">DATABASE_URL, JWT_SECRET</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.213;0.235;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="48" y="217" fill="#768390">• migrations never run on boot
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.253;0.275;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="48" y="242" fill="#adbac7">→ wrote DISCOVERY.md · 6 blockers · <tspan fill="#e3b341">awaiting your OK</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.300;0.322;1" dur="15s" repeatCount="indefinite"/>
    </text>

    <!-- L8 user -->
    <text x="30" y="276" fill="#6cb6ff">❯ execute the repair plan
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.367;0.389;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <!-- repair -->
    <text x="30" y="302" fill="#dcbdfb">🔧 legacy-repair
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.427;0.449;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="48" y="327" fill="#adbac7"><tspan fill="#57ab5a">✓</tspan> npm ci ......................... <tspan fill="#57ab5a">exit 0</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.467;0.489;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="48" y="352" fill="#adbac7"><tspan fill="#57ab5a">✓</tspan> wrote .env.example
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.507;0.529;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="48" y="377" fill="#adbac7"><tspan fill="#57ab5a">✓</tspan> migrations now run before boot
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.547;0.569;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <!-- BLOCKED -->
    <text x="48" y="402" fill="#f47067"><tspan fill="#f47067">✗</tspan> rm -rf /  ··········  🛑 <tspan font-weight="bold">BLOCKED by guard</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.600;0.622;1" dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="48" y="427" fill="#adbac7"><tspan fill="#57ab5a">✓</tspan> npm run dev → <tspan fill="#6cb6ff">http://localhost:3000</tspan>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.653;0.675;1" dur="15s" repeatCount="indefinite"/>
    </text>

    <!-- success -->
    <text x="30" y="463" font-size="16" fill="#57ab5a" font-weight="bold">✅ App running. CLAUDE.md written &amp; verified.
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.720;0.742;1" dur="15s" repeatCount="indefinite"/>
    </text>

    <!-- blinking cursor -->
    <rect x="30" y="481" width="9" height="17" fill="#57ab5a">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.25;0.26;0.75;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
