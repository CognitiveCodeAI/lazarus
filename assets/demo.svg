<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'DejaVu Sans Mono', monospace">
  <defs>
    <clipPath id="screen"><rect x="10" y="10" width="800" height="500" rx="12"/></clipPath>
  </defs>

  <!-- window -->
  <rect x="10" y="10" width="800" height="500" rx="12" fill="#0b0f17" stroke="#1f2733" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="10" y="10" width="800" height="38" rx="12" fill="#11161f"/>
  <rect x="10" y="34" width="800" height="14" fill="#11161f"/>
  <circle cx="32" cy="29" r="6" fill="#ff5f56"/>
  <circle cx="52" cy="29" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="29" r="6" fill="#27c93f"/>
  <text x="410" y="33" text-anchor="middle" font-size="13" fill="#5b6675">lazarus — a repair, start to finish</text>

  <g clip-path="url(#screen)" font-size="15">
    <!-- L1 prompt -->
    <text x="30" y="82" fill="#768390">you@laptop <tspan fill="#57ab5a">~/scary-legacy-app</tspan> $ <tspan fill="#adbac7">claude</tspan></text>
    <!-- L2 user -->
    <text x="30" y="108" fill="#6cb6ff">❯ make this legacy repo run locally</text>

    <!-- L3 discover -->
    <text x="30" y="142" fill="#dcbdfb">🔍 /lazarus:discover <tspan fill="#5b6675">· read-only · Plan Mode</tspan></text>
    <text x="48" y="167" fill="#768390">• needs Node 18 · lockfile is npm-shrinkwrap</text>
    <text x="48" y="192" fill="#768390">• missing .env: <tspan fill="#e3b341">DATABASE_URL, JWT_SECRET</tspan></text>
    <text x="48" y="217" fill="#768390">• migrations never run on boot</text>
    <text x="48" y="242" fill="#adbac7">→ wrote DISCOVERY.md · 6 blockers · <tspan fill="#e3b341">awaiting your OK</tspan></text>

    <!-- L8 user -->
    <text x="30" y="276" fill="#6cb6ff">❯ execute the repair plan</text>
    <!-- repair -->
    <text x="30" y="302" fill="#dcbdfb">🔧 /lazarus:repair</text>
    <text x="48" y="327" fill="#adbac7"><tspan fill="#57ab5a">✓</tspan> npm ci ......................... <tspan fill="#57ab5a">exit 0</tspan></text>
    <text x="48" y="352" fill="#adbac7"><tspan fill="#57ab5a">✓</tspan> wrote .env.example</text>
    <text x="48" y="377" fill="#adbac7"><tspan fill="#57ab5a">✓</tspan> migrations now run before boot</text>
    <!-- BLOCKED -->
    <text x="48" y="402" fill="#f47067"><tspan fill="#f47067">✗</tspan> rm -rf /  ··········  🛑 <tspan font-weight="bold">BLOCKED by guard</tspan></text>
    <text x="48" y="427" fill="#adbac7"><tspan fill="#57ab5a">✓</tspan> npm run dev → <tspan fill="#6cb6ff">http://localhost:3000</tspan></text>

    <!-- success -->
    <text x="30" y="463" font-size="16" fill="#57ab5a" font-weight="bold">✅ App running. CLAUDE.md written &amp; verified.</text>

    <!-- cursor -->
    <rect x="30" y="481" width="9" height="17" fill="#57ab5a"/>
  </g>
</svg>
