<svg xmlns="http://www.w3.org/2000/svg" width="920" height="540" viewBox="0 0 920 540" font-family="ui-monospace, SFMono-Regular, 'JetBrains Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="winbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c111b"/>
      <stop offset="1" stop-color="#0a0e16"/>
    </linearGradient>
    <linearGradient id="barbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11161f"/>
      <stop offset="1" stop-color="#0d121b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#a371f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="920" height="540" fill="#070a12"/>
  <rect width="920" height="540" fill="url(#glow)"/>

  <!-- window -->
  <rect x="24" y="26" width="872" height="488" rx="14" fill="url(#winbg)" stroke="#ffffff" stroke-opacity="0.09"/>
  <!-- title bar -->
  <path d="M24 40 a14 14 0 0 1 14 -14 h844 a14 14 0 0 1 14 14 v30 h-872 z" fill="url(#barbg)"/>
  <line x1="24" y1="70" x2="896" y2="70" stroke="#ffffff" stroke-opacity="0.06"/>
  <circle cx="48" cy="48" r="6.5" fill="#ff5f57"/>
  <circle cx="70" cy="48" r="6.5" fill="#febc2e"/>
  <circle cx="92" cy="48" r="6.5" fill="#28c840"/>
  <text x="120" y="53" font-size="14" fill="#7f8c9e">~/legacy-api — <tspan fill="#c9b6f5" font-weight="700">lazarus</tspan></text>
  <text x="872" y="53" font-size="12" fill="#566173" text-anchor="end">claude code</text>

  <!-- body -->
  <g font-size="16.5">
    <!-- L1 -->
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.03;0.042;1"/>
      <text x="50" y="112"><tspan fill="#a371f7" font-weight="700">❯</tspan> <tspan fill="#e6edf3">claude</tspan></text>
    </g>
    <!-- L3 discover -->
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.11;0.122;1"/>
      <text x="50" y="150"><tspan fill="#dbe4ef" font-weight="700">🔍 discover</tspan>  <tspan fill="#5d6b7e" font-size="13">read-only · plan mode</tspan></text>
    </g>
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.17;0.182;1"/>
      <text x="74" y="178"><tspan fill="#3fb950" font-weight="700">✓</tspan> <tspan fill="#5d6b7e">node 18 · npm-shrinkwrap lockfile</tspan></text>
    </g>
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.22;0.232;1"/>
      <text x="74" y="204"><tspan fill="#3fb950" font-weight="700">✓</tspan> <tspan fill="#5d6b7e">missing env: DATABASE_URL, JWT_SECRET</tspan></text>
    </g>
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.28;0.292;1"/>
      <text x="74" y="230"><tspan fill="#56d4dd" font-weight="700">→</tspan> <tspan fill="#e6edf3">wrote DISCOVERY.md</tspan> <tspan fill="#5d6b7e">· 6 blockers · awaiting your OK</tspan></text>
    </g>
    <!-- approve -->
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.37;0.382;1"/>
      <text x="50" y="268"><tspan fill="#febc2e" font-weight="700">🧑 you approve the plan</tspan> <tspan fill="#5d6b7e">⏎</tspan></text>
    </g>
    <!-- repair -->
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.47;0.482;1"/>
      <text x="50" y="306"><tspan fill="#dbe4ef" font-weight="700">🔧 repair</tspan></text>
    </g>
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.53;0.542;1"/>
      <text x="74" y="334"><tspan fill="#3fb950" font-weight="700">✓</tspan> <tspan fill="#e6edf3">npm ci</tspan> <tspan fill="#3a4150">·····················</tspan> <tspan fill="#3fb950" font-weight="600">exit 0</tspan></text>
    </g>
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.58;0.592;1"/>
      <text x="74" y="360"><tspan fill="#3fb950" font-weight="700">✓</tspan> <tspan fill="#e6edf3">migrations applied</tspan> <tspan fill="#3a4150">··········</tspan> <tspan fill="#3fb950" font-weight="600">exit 0</tspan></text>
    </g>
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.63;0.642;1"/>
      <text x="74" y="386"><tspan fill="#3fb950" font-weight="700">✓</tspan> <tspan fill="#e6edf3">dev server up</tspan> <tspan fill="#5d6b7e">:3000</tspan> <tspan fill="#3a4150">·······</tspan> <tspan fill="#3fb950" font-weight="600">200 OK</tspan></text>
    </g>
    <!-- guard -->
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.73;0.742;1"/>
      <text x="50" y="424"><tspan fill="#a371f7" font-weight="700">❯</tspan> <tspan fill="#e6edf3">rm -rf / --no-preserve-root</tspan></text>
    </g>
    <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.82;0.832;1"/>
      <text x="50" y="456" filter="url(#soft)" opacity="0.55"><tspan fill="#ff7b72" font-weight="800">🛑 BLOCKED</tspan></text>
      <text x="50" y="456"><tspan fill="#ff7b72" font-weight="800">🛑 BLOCKED</tspan> <tspan fill="#5d6b7e">destructive command · exit 2 · never ran</tspan></text>
    </g>
  </g>

  <!-- fresh prompt + blinking cursor (terminal waiting) -->
  <g opacity="0"><animate attributeName="opacity" dur="9s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.88;0.892;1"/>
    <text x="50" y="490" font-size="16.5"><tspan fill="#a371f7" font-weight="700">❯</tspan></text>
    <rect x="68" y="477" width="9" height="17" fill="#3fb950">
      <animate attributeName="opacity" dur="1s" repeatCount="indefinite" values="1;1;0;0;1" keyTimes="0;0.35;0.5;0.85;1"/>
    </rect>
  </g>
</svg>
